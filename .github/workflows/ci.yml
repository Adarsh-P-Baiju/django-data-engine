name: Backend CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: TruffleHog Secret Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install Security Tools
        run: pip install bandit safety

      - name: Bandit Static Analysis
        run: bandit -r import_engine/ -ll -ii

      - name: Safety Dependency Scan
        run: safety check -r requirements.txt || echo "Safety found issues but continuing for now"

  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install Dependencies
        run: pip install ruff mypy django-stubs djangorestframework-stubs

      - name: Ruff Format Check
        run: ruff format --check .

      - name: Ruff Lint Check
        run: ruff check . --output-format=github

      - name: Mypy Type Check
        run: mypy import_engine/ --ignore-missing-imports

  tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [security, quality]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || contains(github.event.head_commit.modified, 'import_engine/') || contains(github.event.head_commit.modified, 'config/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Web Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: django-data-engine-web:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Create Env File
        run: |
          echo "POSTGRES_DB=import_db" >> .env
          echo "POSTGRES_USER=pguser" >> .env
          echo "POSTGRES_PASSWORD=pgpassword" >> .env
          echo "MINIO_BUCKET_NAME=imports" >> .env
          echo "SECRET_KEY=test-secret" >> .env
          echo "DATA_ENCRYPTION_KEY=$(python3 -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> .env

      - name: Start Infrastructure
        run: |
          export WEB_IMAGE=django-data-engine-web:latest
          docker compose up -d
          
      - name: Wait for Services
        run: |
          echo "Waiting for database and redis to be healthy..."
          for i in {1..30}; do
            if docker compose ps | grep "(healthy)" | wc -l | grep -q "3"; then
              echo "Services are healthy!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Verify Migration Integrity
        run: |
          docker compose exec -T web python manage.py makemigrations --check --dry-run || (echo "ERROR: Missing migrations found!" && exit 1)

      - name: Run Tests
        run: |
          docker compose exec -T web bash -c "pip install pytest pytest-django pytest-cov && pytest --cov=import_engine --cov-report=xml"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
