name: 🛠️ Auto-Fix Code Quality

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [ "main", "develop" ]

permissions:
  contents: write

jobs:
  auto-fix:
    name: Auto-Formatter & Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          # We need a personal access token or specific configuration if branch protections are heavily isolated
          # but default permissions: contents: write covers general PR pushes.

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install Ruff
        run: pip install ruff

      - name: Auto-Format Code
        run: ruff format .

      - name: Auto-Fix Lints
        run: ruff check --fix . || true

      - name: Commit Action
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: 🤖 auto-fixed ruff formatting & linting"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
