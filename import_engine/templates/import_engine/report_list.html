<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Engine Diagnostic Monitor</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 { margin-top: 0; font-weight: 800; letter-spacing: -0.025em; }
        .report-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0.75rem;
            text-decoration: none;
            color: white;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .report-link:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            transform: translateX(4px);
        }
        .report-name { font-weight: 600; font-family: monospace; }
        .view-btn {
            background: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .empty { opacity: 0.5; text-align: center; padding: 2rem; }
    </style>
</head>
<body>
    <div class="glass">
        <h1>Diagnostic <span style="color: var(--primary)">Reports</span></h1>
        <p style="opacity: 0.7; margin-bottom: 2rem;">Browse technical diagnostic reports for the test suite.</p>

        {% if reports %}
            {% for report in reports %}
                <a href="{% url 'monitor-report-detail' report_name=report %}" class="report-link">
                    <span class="report-name">{{ report }}</span>
                    <span class="view-btn">View Diagnostics</span>
                </a>
            {% endfor %}
        {% else %}
            <div class="empty">No reports found. Run <code>make test-100k</code> to generate diagnostic data.</div>
        {% endif %}
    </div>
</body>
</html>
